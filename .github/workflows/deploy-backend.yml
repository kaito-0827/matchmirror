name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

env:
  PROJECT_ID: primal-cascade-498808-u5
  REGION: asia-northeast1
  SERVICE_NAME: matchmirror-api
  IMAGE: asia-northeast1-docker.pkg.dev/primal-cascade-498808-u5/matchmirror/api

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            ./backend

      - name: Push Docker image
        run: |
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Write Cloud Run env file
        run: |
          {
            printf 'GOOGLE_GEMINI_API_KEY: "%s"\n' '${{ secrets.GOOGLE_GEMINI_API_KEY }}'
            printf 'GOOGLE_CLOUD_PROJECT: "%s"\n' "$PROJECT_ID"
            printf 'ENVIRONMENT: "production"\n'
            printf 'CORS_ORIGINS: "%s"\n' '${{ secrets.CORS_ORIGINS }}'
          } > "$RUNNER_TEMP/cloud-run-env.yaml"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image=$IMAGE:${{ github.sha }} \
            --platform=managed \
            --region=$REGION \
            --allow-unauthenticated \
            --no-invoker-iam-check \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --env-vars-file="$RUNNER_TEMP/cloud-run-env.yaml" \
            --project=$PROJECT_ID

      - name: Show deployed URL
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME \
            --platform=managed \
            --region=$REGION \
            --project=$PROJECT_ID \
            --format='value(status.url)')
          echo "✅ Deployed: $URL"
