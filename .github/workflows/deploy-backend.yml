name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

env:
  PROJECT_ID: google-hackthon
  REGION: asia-northeast1
  SERVICE_NAME: matchmirror-api
  IMAGE: asia-northeast1-docker.pkg.dev/google-hackthon/matchmirror/api

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            ./backend

      - name: Push Docker image
        run: |
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image=$IMAGE:${{ github.sha }} \
            --platform=managed \
            --region=$REGION \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --set-env-vars="GOOGLE_GEMINI_API_KEY=${{ secrets.GOOGLE_GEMINI_API_KEY }},GOOGLE_CLOUD_PROJECT=google-hackthon,ENVIRONMENT=production,CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}" \
            --project=$PROJECT_ID

      - name: Show deployed URL
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME \
            --platform=managed \
            --region=$REGION \
            --project=$PROJECT_ID \
            --format='value(status.url)')
          echo "✅ Deployed: $URL"
